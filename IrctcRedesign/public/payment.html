<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — Fairplay Rail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <nav class="navbar glass">
    <div class="navbar-inner container">
      <div class="brand">
        <div class="brand-mark">FR</div>
        <div>
          <div class="brand-title">Fairplay Rail</div>
          <div class="brand-sub">Premium Tatkal booking</div>
        </div>
      </div>
      <div class="navbar-links">
        <a href="index.html">Home</a>
        <a href="trains.html">Book Train</a>
        <a href="admin.html">Admin</a>
      </div>
      <div class="navbar-actions">
        <span id="bot-status" class="status-chip status-human">Human</span>
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    <div class="page-header glass">
      <div>
        <div class="eyebrow">Step 4</div>
        <h1>Payment</h1>
        <p>A clean checkout screen with visible fare summary and a simple confirmation flow.</p>
      </div>
      <div class="page-mini-card">
        <span>Security</span>
        <strong>Demo checkout</strong>
      </div>
    </div>

    <section id="booking-summary" class="payment-summary glass"></section>

    <section class="payment-card glass">
      <div class="section-title-row">
        <h2>Select payment method</h2>
        <span class="section-tag">Demo only</span>
      </div>
      <div class="pay-methods">
        <label class="pay-option">
          <input type="radio" name="payment-method" value="upi" checked>
          <div>
            <strong>UPI</strong>
            <span>Google Pay, PhonePe, Paytm</span>
          </div>
        </label>
        <label class="pay-option">
          <input type="radio" name="payment-method" value="card">
          <div>
            <strong>Card</strong>
            <span>Visa, Mastercard, Rupay</span>
          </div>
        </label>
        <label class="pay-option">
          <input type="radio" name="payment-method" value="netbanking">
          <div>
            <strong>Net banking</strong>
            <span>All major banks</span>
          </div>
        </label>
      </div>
    </section>

    <div class="form-actions">
      <a href="passengers.html" class="btn btn-ghost">Back</a>
      <button id="pay-btn" type="button" class="btn btn-primary">Pay ₹<span id="total-fare">0</span></button>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/bot-detector.js"></script>
  <script>
    if (typeof initBotSession !== 'undefined') initBotSession();

    const booking = JSON.parse(sessionStorage.getItem('booking') || '{}');
    if (!booking.trainId) window.location.href = 'trains.html';

    document.getElementById('booking-summary').innerHTML = `
      <div class="payment-grid">
        <div>
          <div class="summary-label">Trip</div>
          <div class="summary-value">${booking.trainName}</div>
          <div class="summary-sub">${booking.from} → ${booking.to}</div>
        </div>
        <div>
          <div class="summary-label">Pnr</div>
          <div class="summary-value mono">${booking.pnr}</div>
        </div>
        <div>
          <div class="summary-label">Total</div>
          <div class="summary-value">₹${booking.fare.total}</div>
        </div>
      </div>
      <div class="payment-passenger">
        ${booking.passengers.map(p => `<span>${p.name} • ${p.age} • ${p.gender} • ${p.berth}</span>`).join('')}
      </div>
    `;

    document.getElementById('total-fare').textContent = booking.fare.total;
    document.getElementById('pay-btn').addEventListener('click', function() {
      alert('Payment successful! Your ticket is confirmed.');
      window.location.href = 'confirmation.html';
    });
  </script>
</body>
</html>
