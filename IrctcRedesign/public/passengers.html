<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passenger Details — IRCTC Tatkal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner container">
      <div class="navbar-logo"><span>🚂</span> IRCTC Tatkal</div>
      <div class="navbar-links">
        <a href="index.html">Home</a>
        <a href="trains.html">Book Train</a>
        <a href="admin.html">Admin</a>
      </div>
      <div class="navbar-actions">
        <span id="bot-status" class="badge badge-human">✓ Human</span>
      </div>
    </div>
  </nav>

  <main class="container mt-24">
    <div class="stepper">
      <div class="step done"><div class="step-circle">1</div><div class="step-label">Home</div></div>
      <div class="step-line"></div>
      <div class="step done"><div class="step-circle">2</div><div class="step-label">Train</div></div>
      <div class="step-line"></div>
      <div class="step active"><div class="step-circle">3</div><div class="step-label">Passengers</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-circle">4</div><div class="step-label">Payment</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-circle">5</div><div class="step-label">Confirm</div></div>
    </div>

    <h1 class="section-title mb-8">👥 Passenger Details</h1>
    <p class="section-sub">Enter passenger information</p>

    <div id="train-info" class="card mb-16"></div>

    <div class="card mb-16">
      <div class="card-body">
        <h3 class="font-bold mb-16">Passenger 1</h3>
        <div class="flex gap-8 flex-col">
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" id="p1-name" class="form-input" required placeholder="Full name">
          </div>
          <div class="flex gap-8">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Age *</label>
              <input type="number" id="p1-age" class="form-input" required placeholder="Age" min="1" max="120">
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Gender *</label>
              <select id="p1-gender" class="form-select" required>
                <option value="">Select</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-16">
      <div class="card-body">
        <h3 class="font-bold mb-16">📞 Contact Details</h3>
        <div class="flex gap-8 flex-col">
          <div class="form-group">
            <label class="form-label">Mobile Number *</label>
            <input type="tel" id="mobile" class="form-input" required placeholder="9876543210">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input" placeholder="example@email.com">
          </div>
        </div>
      </div>
    </div>

    <div class="flex gap-12 justify-between">
      <a href="trains.html" class="btn btn-ghost">← Back</a>
      <button id="continue-btn" class="btn btn-orange">Continue to Payment →</button>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/bot-detector.js"></script>
  <script>
    // Initialize
    if (typeof initBotSession !== 'undefined') {
      initBotSession();
    }

    // Get train
    const selectedTrain = JSON.parse(sessionStorage.getItem('selectedTrain') || '{}');
    
    if (!selectedTrain.id) {
      alert('No train selected!');
      window.location.href = 'trains.html';
      return;
    }

    // Display train
    document.getElementById('train-info').innerHTML = `
      <div class="card-body">
        <div class="flex justify-between items-center">
          <div>
            <h3 class="font-bold">${selectedTrain.name}</h3>
            <p class="text-sm text-muted">${selectedTrain.from} → ${selectedTrain.to}</p>
            <p class="text-sm text-muted">Date: ${selectedTrain.date}</p>
          </div>
        </div>
      </div>
    `;

    // Continue button click
    document.getElementById('continue-btn').addEventListener('click', async function() {
      // Validate
      const name = document.getElementById('p1-name').value;
      const age = document.getElementById('p1-age').value;
      const gender = document.getElementById('p1-gender').value;
      const mobile = document.getElementById('mobile').value;
      const email = document.getElementById('email').value;

      if (!name || !age || !gender || !mobile) {
        alert('Please fill all required fields');
        return;
      }

      // Create booking data
      const bookingData = {
        trainId: selectedTrain.id,
        trainName: selectedTrain.name,
        from: selectedTrain.from,
        to: selectedTrain.to,
        date: selectedTrain.date,
        travelClass: 'SL',
        passengers: [{
          name: name,
          age: age,
          gender: gender,
          berthPref: 'No pref',
          coach: 'B1',
          berth: 1,
          berthType: 'LB',
          status: 'CNF'
        }],
        contactMobile: mobile,
        contactEmail: email,
        insurance: false,
        fare: {
          base: 735,
          reservation: 40,
          gst: 39,
          total: 814
        }
      };

      // Save to sessionStorage (for payment page)
      sessionStorage.setItem('booking', JSON.stringify(bookingData));

      // Redirect to payment
      console.log('Redirecting to payment...');
      window.location.href = 'payment.html';
    });
  </script>
</body>
</html>
