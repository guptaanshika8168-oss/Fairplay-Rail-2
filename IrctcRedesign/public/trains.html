<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Train — Fairplay Rail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <nav class="navbar glass">
    <div class="navbar-inner container">
      <div class="brand">
        <div class="brand-mark">FR</div>
        <div>
          <div class="brand-title">Fairplay Rail</div>
          <div class="brand-sub">Premium Tatkal booking</div>
        </div>
      </div>
      <div class="navbar-links">
        <a href="index.html">Home</a>
        <a href="trains.html" class="active">Book Train</a>
        <a href="admin.html">Admin</a>
      </div>
      <div class="navbar-actions">
        <span id="bot-status" class="status-chip status-human">Human</span>
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    <div class="page-header glass">
      <div>
        <div class="eyebrow">Step 2</div>
        <h1>Choose your train</h1>
        <p>Use the filters below to explore available Tatkal options with a cleaner, more modern interface.</p>
      </div>
      <div class="page-mini-card">
        <span>Visual mode</span>
        <strong>Human + Bot tracker active</strong>
      </div>
    </div>

    <section class="filter-panel glass">
      <div class="filter-grid">
        <div class="form-group">
          <label>From</label>
          <input type="text" id="filter-from" class="form-input" placeholder="NDLS">
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="text" id="filter-to" class="form-input" placeholder="CSMT">
        </div>
        <div class="form-group">
          <label>Class</label>
          <select id="filter-class" class="form-select">
            <option value="all">All Classes</option>
            <option value="SL">Sleeper</option>
            <option value="3A">3 AC</option>
            <option value="2A">2 AC</option>
            <option value="1A">1 AC</option>
          </select>
        </div>
        <div class="form-group filter-action-wrap">
          <label>&nbsp;</label>
          <button id="filter-btn" class="btn btn-primary" type="button">Filter Trains</button>
        </div>
      </div>
    </section>

    <section id="train-list" class="train-list"></section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/bot-detector.js"></script>
  <script>
    const trains = [
      { id: '12951', name: 'Mumbai Rajdhani', from: 'NDLS', to: 'CSMT', departs: '16:55', arrives: '10:35 +1', duration: '17h 40m', class: 'SL', avl: { SL: 42, '3A': 8, '2A': 2, '1A': 5 }, fare: { SL: 945, '3A': 2455, '2A': 3520, '1A': 5880 } },
      { id: '12615', name: 'Grand Trunk Express', from: 'NDLS', to: 'CSMT', departs: '06:30', arrives: '00:10 +1', duration: '17h 40m', class: '3A', avl: { SL: 12, '3A': 7, '2A': 2, '1A': 0 }, fare: { SL: 780, '3A': 2100, '2A': 3100, '1A': 5200 } },
      { id: '12137', name: 'Punjab Mail', from: 'NDLS', to: 'CSMT', departs: '20:10', arrives: '19:45 +1', duration: '23h 35m', class: 'SL', avl: { SL: 78, '3A': 24, '2A': 10, '1A': 3 }, fare: { SL: 735, '3A': 1980, '2A': 2900, '1A': 4800 } },
      { id: '12263', name: 'Pune Duronto Express', from: 'NDLS', to: 'PUNE', departs: '22:30', arrives: '14:05 +1', duration: '15h 35m', class: '2A', avl: { SL: 0, '3A': 3, '2A': 1, '1A': 0 }, fare: { SL: 1100, '3A': 2800, '2A': 4100, '1A': 6800 } }
    ];

    const list = document.getElementById('train-list');

    function chipText(v) {
      if (v === 0) return 'WL';
      return v;
    }

    function renderTrains(items) {
      list.innerHTML = items.map(train => `
        <article class="train-card glass">
          <div class="train-card-head">
            <div>
              <div class="train-name">${train.name}</div>
              <div class="train-meta">#${train.id} • ${train.from} → ${train.to}</div>
            </div>
            <div class="train-badge">${train.class}</div>
          </div>

          <div class="train-route">
            <div>
              <div class="station-code">${train.from}</div>
              <div class="station-time">${train.departs}</div>
            </div>
            <div class="route-mid">
              <div class="route-line"></div>
              <div class="route-duration">${train.duration}</div>
              <div class="route-line"></div>
            </div>
            <div class="station-right">
              <div class="station-code">${train.to}</div>
              <div class="station-time">${train.arrives}</div>
            </div>
          </div>

          <div class="availability-grid">
            ${Object.entries(train.avl).map(([cls, val]) => `
              <div class="avl-pill">
                <span>${cls}</span>
                <strong>${chipText(val)}</strong>
              </div>
            `).join('')}
          </div>

          <div class="train-footer">
            <div class="fare-info">
              <span>Starting fare</span>
              <strong>₹${train.fare[train.class] || train.fare.SL}</strong>
            </div>
            <button class="btn btn-primary" onclick="selectTrain('${train.id}', '${train.name}', '${train.from}', '${train.to}', '${train.departs}', '${train.arrives}')">Book Now</button>
          </div>
        </article>
      `).join('');
    }

    function selectTrain(id, name, from, to, departs, arrives) {
      sessionStorage.setItem('selectedTrain', JSON.stringify({
        id, name, from, to, departs, arrives,
        date: new Date().toLocaleDateString(),
        travelClass: 'SL'
      }));
      window.location.href = 'passengers.html';
    }

    function applyFilter() {
      const from = document.getElementById('filter-from').value.trim().toUpperCase();
      const to = document.getElementById('filter-to').value.trim().toUpperCase();
      const cls = document.getElementById('filter-class').value;
      const filtered = trains.filter(t => {
        const okFrom = !from || t.from.includes(from);
        const okTo = !to || t.to.includes(to);
        const okCls = cls === 'all' || t.class === cls || t.avl[cls] > 0;
        return okFrom && okTo && okCls;
      });
      renderTrains(filtered);
    }

    document.getElementById('filter-btn').addEventListener('click', applyFilter);
    renderTrains(trains);
  </script>
</body>
</html>
