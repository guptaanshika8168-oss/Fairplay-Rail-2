<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — RailGuard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner container">
      <div class="navbar-logo"><span>🚂</span> IRCTC Admin</div>
      <div class="navbar-links">
        <a href="/index.html">Home</a>
        <a href="/admin.html" class="active">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container mt-24">
    <h1 class="section-title mb-8">🛡️ Admin Dashboard</h1>
    <div id="stats-grid" class="flex gap-16 mb-24"></div>
    <div class="card"><div class="card-body"><table id="sessions-table"><thead><tr><th>ID</th><th>IP</th><th>Score</th><th>Status</th></tr></thead><tbody id="sessions-tbody"></tbody></table></div></div>
  </main>

  <script>
    async function loadAdminData() {
      const res = await fetch('/api/admin/sessions');
      const data = await res.json();
      document.getElementById('stats-grid').innerHTML = `<div class="card"><div class="card-body"><p>Total</p><p class="font-bold">${data.stats.total}</p></div></div><div class="card"><div class="card-body"><p>Blocked</p><p class="font-bold text-red">${data.stats.blocked}</p></div></div>`;
      document.getElementById('sessions-tbody').innerHTML = data.rows.map(s => `<tr><td>${s.id}</td><td>${s.ip}</td><td>${s.score}</td><td><span class="badge badge-${s.status}">${s.status}</span></td></tr>`).join('');
    }
    loadAdminData();
    setInterval(loadAdminData, 5000);
  </script>
</body>
</html>
